<!DOCTYPE html>
    <html>
        <head>
            <title>Menu #1</title>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width" />
            <style type="text/css">
            	body {
            		display: flex;
            		align-items: center;
            		justify-content: center;
            		height: 100vh;
            		overflow: hidden;
            		font-family: sans-serif;
            		text-align: center;
            	}

				.button {
				  width:  70px;
				  height: 70px;
				  cursor: pointer;
				  margin: 10px;
				  border-radius: 50%;    
				  position: relative;
				  display: inline-block;    
				}

				.button span {
				  width:  70px;
				  height: 70px;
				  position: absolute;                
				  top: 0;
				  left: 0;
				  background: black;
				  color: #E7C1B8;
				  border-radius: 50%;
				  transform: scale(0) rotate(-180deg);
				  transition: all .5s;
				  display: flex;
				  justify-content: center;
				  align-items: center;
				}

				.button:hover span {
				  transform: scale(1) rotate(0);      
				  opacity: 0.5;  
				}

				.one {
				  background: #7D3737;
				}

				.two {
				  background: #B26C6E;
				}

				.three {
				  background: #E7C1B8;
				}
            </style>
        </head>
        <body>
			<div class="nav">
			    <div class="button one"><span>Link #1</span></div>
			    <div class="button two"><span>Link #2</span></div>
			    <div class="button three"><span>Link #3</span></div>
			</div>
        </body>
    </html>
